# Dev: URLs updated by `shopify app dev`
# Production: set application_url to https://tryaura-app.onrender.com then run `shopify app deploy`

client_id = "5a8a20c196783d41487e34339ebc5989"
name = "TryAura"
application_url = "https://tryaura-app.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[access_scopes]
scopes = "read_products,write_products,read_themes,write_themes,read_customers"

[shop.metafields.app.api_url]
type = "single_line_text_field"
name = "TryAura Backend API URL"
access.storefront = "public_read"

[auth]
redirect_urls = [ "https://tryaura-app.onrender.com/auth/callback" ]
